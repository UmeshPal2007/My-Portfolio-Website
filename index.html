<!DOCTYPE html>
<html lang="en">

<!-- HEAD TAG -->

<head>

    <title>UmeshPal-Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Sekuya&display=swap"

<!-- BODY TAG -->

<body>
    <header>
        <nav>
            <div id="logo">UMESH PAL<br>PORTFOLIO</div>
            <div>

                    <li><a href="link">Home</a></li>
                    <li><a href="link">Projects</a></li>

                    <li><a href="link">Services</a></li>
                    <li><a href="link">Contact Me</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>

        <!-- Section 1 -->
        <section id="section1">

                <span id="Hello">Hello !</span><br>
                <span id="mynameis">My Name is</span><br>
                <span id="umeshpal">Umesh Pal.</span><br>

                <span id="element"></span>
            </div>
            <div>
                <img src="/My-Portfolio-Website/dev.png" alt="background image">
            </div>
        </section>

        <!-- Section 2 -->

    <script src="https://unpkg.com/typed.js@3.0.0/dist/typed.umd.js"></script>

    <!-- Setup and start animation! -->
    <script>
        var typed = new Typed('#element', {

            typeSpeed: 50,
        });
    </script>
